<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1612"/>

  <!-- Glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#3ecf8e" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- Bot head -->
  <rect x="148" y="130" width="216" height="180" rx="32" fill="#2a2520" stroke="#3ecf8e" stroke-width="4"/>

  <!-- Eyes -->
  <rect x="188" y="175" width="52" height="52" rx="14" fill="#3ecf8e" opacity="0.9"/>
  <rect x="272" y="175" width="52" height="52" rx="14" fill="#3ecf8e" opacity="0.9"/>

  <!-- Eye shine -->
  <rect x="196" y="183" width="18" height="14" rx="5" fill="white" opacity="0.6"/>
  <rect x="280" y="183" width="18" height="14" rx="5" fill="white" opacity="0.6"/>

  <!-- Mouth -->
  <rect x="196" y="256" width="120" height="22" rx="11" fill="#3ecf8e" opacity="0.7"/>

  <!-- Antenna -->
  <rect x="248" y="94" width="16" height="38" rx="8" fill="#3ecf8e"/>
  <circle cx="256" cy="86" r="14" fill="#ffb830"/>
  <circle cx="256" cy="86" r="7" fill="white" opacity="0.6"/>

  <!-- Neck -->
  <rect x="230" y="308" width="52" height="24" rx="8" fill="#3ecf8e" opacity="0.8"/>

  <!-- Body -->
  <rect x="140" y="330" width="232" height="110" rx="24" fill="#2a2520" stroke="#3ecf8e" stroke-width="3"/>

  <!-- Chart bars on body -->
  <rect x="170" y="374" width="22" height="42" rx="5" fill="#3ecf8e" opacity="0.5"/>
  <rect x="200" y="356" width="22" height="60" rx="5" fill="#3ecf8e" opacity="0.7"/>
  <rect x="230" y="364" width="22" height="52" rx="5" fill="#ff6b6b" opacity="0.6"/>
  <rect x="260" y="348" width="22" height="68" rx="5" fill="#3ecf8e" opacity="0.9"/>
  <rect x="290" y="360" width="22" height="56" rx="5" fill="#3ecf8e" opacity="0.6"/>

  <!-- Arms -->
  <rect x="76" y="340" width="66" height="28" rx="14" fill="#2a2520" stroke="#3ecf8e" stroke-width="3"/>
  <rect x="370" y="340" width="66" height="28" rx="14" fill="#2a2520" stroke="#3ecf8e" stroke-width="3"/>

  <!-- Coin badge -->
  <circle cx="390" cy="168" r="36" fill="#ffb830"/>
  <text x="390" y="178" font-family="system-ui" font-size="30" font-weight="900" text-anchor="middle" fill="#1a1612">₿</text>
</svg>
