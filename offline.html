<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>오프라인 — 크립토 봇 아레나</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:#1a1612;color:#faf7f2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
  .wrap{max-width:320px;}
  .em{font-size:72px;margin-bottom:20px;display:block;}
  h1{font-size:22px;font-weight:900;margin-bottom:12px;color:#3ecf8e;}
  p{font-size:14px;color:#b0a89e;line-height:1.6;margin-bottom:24px;}
  button{background:#3ecf8e;color:#1a1612;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:800;cursor:pointer;width:100%;}
  button:active{opacity:.85;}
</style>
</head>
<body>
<div class="wrap">
  <span class="em">🤖</span>
  <h1>인터넷이 없어요</h1>
  <p>봇 아레나에 접속하려면 인터넷 연결이 필요해요.<br>Wi-Fi나 데이터를 확인하고 다시 시도해주세요.</p>
  <button onclick="location.reload()">다시 시도</button>
</div>
</body>
</html>
